name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]" ruff mypy
      - name: Lint (zero findings)
        run: ruff check src/
      - name: Types (zero errors)
        run: mypy
      - name: Build fixtures
        run: python fixtures/build.py
      - name: Tests + eval floors (cassette replay, $0 LLM)
        # No API key in this job BY DESIGN: a cassette miss fails loudly
        # instead of silently spending money or producing unpinned outputs.
        run: pytest tests/ -q --ignore=tests/test_snowflake_live.py --ignore=tests/test_bigquery_live.py

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[warehouses]" pip-audit
      - name: Dependency CVE audit
        run: pip-audit

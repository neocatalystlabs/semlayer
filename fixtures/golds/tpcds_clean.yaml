# Gold semantic layer for the tpcds_clean fixture (24 tables, sf=0.01).
# Hand-authored (no confidence fields = human truth). Standard TPC-DS star schema.
semantic_layer:
  spec_version: 0.1.0
  name: tpcds_clean
  description: 'TPC-DS clean fixture: 24-table decision-support star/snowflake schema (7 fact, 17 dimension
    tables) at sf=0.01. Hand-authored gold — clean data, no deprecated/orphaned/conflicting elements.'

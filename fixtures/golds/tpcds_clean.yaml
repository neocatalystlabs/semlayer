  hierarchies:
  - name: calendar_time
    kind: time
    dimension_table: date_dim
    base_column: d_date
    levels:
    - name: year
      column: d_year
    - name: quarter
      column: d_qoy
    - name: month
      column: d_moy
    - name: day
      column: d_date
  - name: product
    kind: level
    dimension_table: item
    levels:
    - name: category
      column: i_category
    - name: class
      column: i_class
    - name: item
      column: i_item_id
  - name: customer_geography
    kind: level
    dimension_table: customer_address
    levels:
    - name: country
      column: ca_country
    - name: state
      column: ca_state
    - name: county
      column: ca_county
    - name: city
      column: ca_city
  - name: store_geography
    kind: level
    dimension_table: store
    levels:
    - name: country
      column: s_country
    - name: state
      column: s_state
    - name: county
      column: s_county
    - name: city
      column: s_city
  metrics:
  - name: total_store_sales_revenue
    display_name: Total Store Sales Revenue
    type: simple
    measure: store_sales.ss_ext_sales_price
    agg: sum
    dimensions:
    - calendar_time.*
    - product.category
    - store_geography.state
    grain: store_sales line item
    description: Total extended sales price across store-channel line items.
  - name: total_net_profit
    display_name: Total Net Profit (Store Channel)
    type: simple
    measure: store_sales.ss_net_profit
    agg: sum
    dimensions:
    - calendar_time.*
    - product.category
    grain: store_sales line item
    description: Total net profit across store-channel line items.
  - name: avg_item_price
    display_name: Average Item Price
    type: simple
    measure: item.i_current_price
    agg: avg
    dimensions:
    - product.category
    - product.class
    grain: item
    description: Average current list price of items.
  - name: store_sales_quantity
    display_name: Store Sales Quantity
    type: simple
    measure: store_sales.ss_quantity
    agg: sum
    dimensions:
    - calendar_time.*
    - product.category
    - store_geography.state
    grain: store_sales line item
    description: Total units sold across store-channel line items.
  - name: store_sales_line_count
    display_name: Store Sales Line Count
    type: simple
    measure: store_sales.ss_ticket_number
    agg: count
    dimensions:
    - calendar_time.*
    grain: store_sales line item
    description: Count of store-channel sales line items. Input metric for returns_rate.
  - name: store_returns_line_count
    display_name: Store Returns Line Count
    type: simple
    measure: store_returns.sr_ticket_number
    agg: count
    dimensions:
    - calendar_time.*
    grain: store_returns line item
    description: Count of store-channel return line items. Input metric for returns_rate.
  - name: returns_rate
    display_name: Returns Rate
    type: ratio
    numerator: store_returns_line_count
    denominator: store_sales_line_count
    description: Ratio of store-channel return line items to store-channel sales line items.
  repo_knowledge:
    domains:
    - name: store_channel
      description: Brick-and-mortar store sales and returns.
      tables:
      - store_sales
      - store_returns
      - store
    - name: catalog_channel
      description: Catalog sales and returns.
      tables:
      - catalog_sales
      - catalog_returns
      - call_center
      - catalog_page
    - name: web_channel
      description: Web sales and returns.
      tables:
      - web_sales
      - web_returns
      - web_site
      - web_page
    - name: inventory
      description: Warehouse on-hand inventory snapshots.
      tables:
      - inventory
      - warehouse
    - name: customer
      description: Customer identity, address, and demographic dimensions.
      tables:
      - customer
      - customer_address
      - customer_demographics
      - household_demographics
      - income_band
    - name: product
      description: Product catalog dimension and related lookups.
      tables:
      - item
      - promotion
      - reason
      - ship_mode
      - time_dim
      - date_dim
    routing:
    - intent: revenue analysis
      description: Questions about sales revenue should route to the channel fact tables, not returns.
      use:
      - store_sales
      - web_sales
      - catalog_sales
      avoid:
      - table: store_returns
        reason: returns reduce revenue but are not revenue themselves
      - table: web_returns
        reason: returns reduce revenue but are not revenue themselves
      - table: catalog_returns
        reason: returns reduce revenue but are not revenue themselves

      entity_role: dimension
    - name: cc_mkt_id
      sql_type: BIGINT
      semantic_type: identifier
      entity_role: natural_key
    - name: cc_mkt_class
      sql_type: VARCHAR
      semantic_type: free_text
      entity_role: dimension
    - name: cc_mkt_desc
      sql_type: VARCHAR
      semantic_type: free_text

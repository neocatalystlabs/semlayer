      sql_type: VARCHAR
      semantic_type: enum
      entity_role: dimension
      description: "VIEW/CLICK/ADD_CART/PURCHASE \u2014 deliberately no decode dictionary table exists\
        \ in this warehouse; values are self-explanatory strings."
      enum_values:
      - value: VIEW
        meaning: page viewed
        decode_source: human
      - value: CLICK
        meaning: element clicked
        decode_source: human
      - value: ADD_CART
        meaning: item added to cart
        decode_source: human
      - value: PURCHASE
        meaning: checkout completed
        decode_source: human

      entity_role: dimension
    - name: ord_id
      sql_type: INTEGER
      semantic_type: identifier
      entity_role: foreign_key
      description: Populated only when evt_typ_cd = 'PURCHASE'.
      foreign_key:
        references: ord_hdr.ord_id
        relationship: many_to_one

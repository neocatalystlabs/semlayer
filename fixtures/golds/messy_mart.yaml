    cardinality: many_to_one
    join_type: left
    fanout_risk: true
  - name: dly_sls_agg_to_date_dim
    from:
      table: dly_sls_agg
      columns:
      - agg_dt_key
    to:
      table: date_dim
      columns:
      - date_key
    cardinality: many_to_one
    join_type: left
    fanout_risk: false
  - name: dly_sls_agg_to_store_dim
    from:
      table: dly_sls_agg
      columns:
      - store_id
    to:
      table: store_dim
      columns:
      - store_id
    cardinality: many_to_one
    join_type: left
    fanout_risk: false
  - name: mth_cust_agg_to_cust_mstr
    from:
      table: mth_cust_agg
      columns:
      - cust_id
    to:
      table: cust_mstr
      columns:
      - cust_id
    cardinality: many_to_one
    join_type: left
    fanout_risk: false
  hierarchies:
  - name: product_hierarchy
    kind: level
    dimension_table: prod_ref
    levels:
    - name: department
      column: dept_cd
    - name: category
      column: category_cd
    - name: product
      column: prod_id
  - name: geography
    kind: level
    dimension_table: store_dim
    levels:
    - name: country
      column: cntry_cd
    - name: state
      column: state_cd
    - name: city
      column: city_nm
  - name: order_time
    kind: time
    dimension_table: ord_hdr
    base_column: ord_dt
    levels:
    - name: year
      grain_expr:
        duckdb: date_trunc('year', ord_dt)
    - name: quarter
      grain_expr:
        duckdb: date_trunc('quarter', ord_dt)
    - name: month
      grain_expr:
        duckdb: date_trunc('month', ord_dt)
    - name: day
      grain_expr:
        duckdb: ord_dt
  aggregate_tables:
  - table: dly_sls_agg
    aggregates: ord_hdr
    mapping_source: lineage
    grain:
    - date_dim.date_key
    - store_dim.store_id
    measure_mappings:
    - source: sum(ord_hdr.tot_amt)
      target: dly_sls_agg.tot_sls_amt
    - source: count(ord_hdr.ord_id)
      target: dly_sls_agg.ord_cnt
    routing:
      rule: "Route daily/store-grain revenue or order-count queries here. Excludes ord_hdr rows with sts_cd\
        \ = 'X' (cancelled) \u2014 both the aggregate and the base-fact rollup apply that filter."
      status: verified
    consistency:
      method: deterministic_window
      status: consistent
  - table: mth_cust_agg
    aggregates: ord_hdr
    mapping_source: lineage
    grain:
    - order_time.month
    - cust_mstr.cust_id
    measure_mappings:
    - source: sum(ord_hdr.tot_amt)
      target: mth_cust_agg.tot_spend_amt
    - source: count(ord_hdr.ord_id)
      target: mth_cust_agg.ord_cnt
    routing:
      rule: Route monthly customer-spend queries here. Excludes cancelled (sts_cd = 'X') orders, same
        as dly_sls_agg.
      status: verified
    consistency:
      method: deterministic_window
      status: consistent
  metrics:
  - name: total_order_revenue
    display_name: Total Order Revenue
    type: simple
    measure: ord_hdr.tot_amt
    agg: sum
    dimensions:
    - order_time.*
    - geography.*
    - product_hierarchy.*
    - ord_hdr.sts_cd
    grain: order
    fanout_safety:
      strategy: symmetric_aggregate
      symmetric_key: ord_hdr.ord_id
  - name: completed_order_revenue
    display_name: Completed Order Revenue
    type: simple
    measure: ord_hdr.tot_amt
    agg: sum
    filter: ord_hdr.sts_cd = 'C'
    dimensions:
    - order_time.*
    - geography.*
    grain: order
    fanout_safety:
      strategy: symmetric_aggregate
      symmetric_key: ord_hdr.ord_id
  - name: line_item_revenue
    display_name: Line Item Revenue
    type: simple
    measure: ord_ln.line_amt
    agg: sum
    dimensions:
    - product_hierarchy.*
    - order_time.*
    grain: order_line
  - name: order_count
    display_name: Order Count
    type: simple
    measure: ord_hdr.ord_id
    agg: count
    dimensions:
    - order_time.*
    - geography.*
    - ord_hdr.sts_cd
    grain: order
  - name: avg_order_value
    display_name: Average Order Value
    type: derived
    expr: total_order_revenue / order_count
    input_metrics:
    - total_order_revenue
    - order_count
    dimensions:
    - order_time.*
    - geography.*
  repo_knowledge:
    routing:
    - intent: customer profile / current attributes
      use:
      - cust_mstr
      avoid:
      - table: cust_mstr_legacy
        reason: deprecated pre-migration table with no SCD2 history; superseded by cust_mstr
    - intent: order revenue analysis
      use:
      - ord_hdr
      - dly_sls_agg
      - mth_cust_agg
      avoid:
      - table: ord_hdr_legacy
        reason: deprecated; covers only 2020-2022 and uses an incompatible status vocabulary (OPEN/CLOSED/CANCELLED
          vs sts_cd)
      - table: ord_ln
        reason: line-level join fans out ord_hdr.tot_amt; use ord_ln.line_amt for line-grain revenue instead
    - intent: product catalog lookup
      use:
      - prod_ref
      avoid:
      - table: prod_ref_legacy
        reason: deprecated pre-migration product export; superseded by prod_ref
    - intent: subscription / recurring revenue (MRR)
      use:
      - sub_evt
      avoid:
      - table: web_evt
        reason: web_evt captures site interactions, not subscription lifecycle; not a source of MRR
    conventions:
      notes:
      - No PK/FK constraints are declared in the warehouse DDL; every key and relationship in this document
        was recovered from data, not the catalog.
      - '*_cd / *_flg / *_dt / *_amt suffixes are the house naming convention: coded value, 0/1 flag,
        date, monetary amount respectively.'
      - Some enum columns (ord_hdr.sts_cd, sub_evt.evt_typ_cd, ord_rtn.rtn_rsn_cd) have a decode dictionary
        table; others (web_evt.evt_typ_cd, cust_mstr.seg_cd, promo_dim.promo_typ_cd, cust_addr.addr_typ_cd)
        do not and are decoded only by LLM guess or self-evident human labeling.
    domains:
    - name: sales
      description: 'Order-to-cash: headers, lines, returns, and their rollups.'
      tables:
      - ord_hdr
      - ord_ln
      - ord_rtn
      - dly_sls_agg
      - mth_cust_agg
      - ord_hdr_legacy
    - name: customer
      description: Customer identity, history, and addresses.
      tables:
      - cust_mstr
      - cust_mstr_legacy
      - cust_addr
    - name: product
      description: Product catalog and cross-reference data.
      tables:
      - prod_ref
      - prod_ref_legacy
      - dept_dim
      - category_dim
      - prod_attr_ext
      - sku_xref
    - name: engagement
      description: Subscription and web/app behavioral events.
      tables:
      - sub_evt
      - web_evt
    - name: operations
      description: ETL and data-quality operational metadata; not business data.
      tables:
      - etl_log
      - stg_orders_raw
      - stg_customers_raw
      - job_ctrl
      - dq_chk_log
      - file_load_hist

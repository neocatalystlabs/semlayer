      - value: RENEW
        meaning: Subscription renewed
        decode_source: dictionary_join
      - value: UPGRADE
        meaning: Plan upgraded
        decode_source: dictionary_join
      - value: DOWNGRADE
        meaning: Plan downgraded
        decode_source: dictionary_join
      - value: CANCEL

semantic_layer:
  spec_version: 0.1.0
  name: messy_mart
  description: '~35-table messy enterprise mart: cryptic names, no declared keys, SCD2 customers, product/geo
    hierarchies, two lineage-backed aggregates, two deprecated legacy tables.'
  calendar:
    timezone: UTC
    week_start: monday
  tables:
  - name: date_dim
    table_type: dimension
    grain: one row per calendar day
    source: main.date_dim
    primary_key:
    - date_key
    columns:
    - name: date_key
      sql_type: INTEGER
      semantic_type: identifier
      entity_role: primary_key
      description: YYYYMMDD integer key
    - name: cal_dt
      sql_type: DATE
      semantic_type: date
      entity_role: dimension
    - name: day_of_wk
      sql_type: INTEGER
      semantic_type: code
      entity_role: dimension
    - name: day_nm
      sql_type: VARCHAR
      semantic_type: free_text
      entity_role: dimension
    - name: wk_of_yr
      sql_type: INTEGER
      semantic_type: code
      entity_role: dimension
    - name: mth_nbr
      sql_type: INTEGER
      semantic_type: code
      entity_role: dimension
    - name: mth_nm
      sql_type: VARCHAR
      semantic_type: free_text
      entity_role: dimension
    - name: qtr_nbr
      sql_type: INTEGER
      semantic_type: code
      entity_role: dimension
    - name: yr_nbr
      sql_type: INTEGER
      semantic_type: code
      entity_role: dimension
    - name: is_wknd_flg
      sql_type: INTEGER
      semantic_type: flag
      entity_role: dimension
  - name: dept_dim
    table_type: dimension
    grain: one row per department
    source: main.dept_dim
    primary_key:
    - dept_cd
    columns:
    - name: dept_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: primary_key
    - name: dept_nm
      sql_type: VARCHAR
      semantic_type: name
      entity_role: dimension
  - name: category_dim
    table_type: dimension
    grain: one row per product category
    source: main.category_dim
    primary_key:
    - category_cd
    columns:
    - name: category_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: primary_key
    - name: category_nm
      sql_type: VARCHAR
      semantic_type: name
      entity_role: dimension
    - name: dept_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: foreign_key
      foreign_key:
        references: dept_dim.dept_cd
        relationship: many_to_one
  - name: prod_ref
    table_type: dimension
    grain: one row per product (current)
    source: main.prod_ref
    primary_key:
    - prod_sk
    columns:
    - name: prod_sk
      sql_type: INTEGER
      semantic_type: identifier
      entity_role: primary_key
    - name: prod_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: natural_key
      canonical_entity: product
    - name: prod_nm
      sql_type: VARCHAR
      semantic_type: name
      entity_role: dimension
    - name: category_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: foreign_key
      foreign_key:
        references: category_dim.category_cd
        relationship: many_to_one
    - name: dept_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: foreign_key
      description: Denormalized copy of category_dim.dept_cd; kept redundant on purpose (real-warehouse
        cruft).
      foreign_key:
        references: dept_dim.dept_cd
        relationship: many_to_one
    - name: unit_cost
      sql_type: DECIMAL(10,2)
      semantic_type: monetary_value
      entity_role: measure
      aggregations:
        allowed:
        - avg
        - min
        - max
        default: avg
    - name: list_price
      sql_type: DECIMAL(10,2)
      semantic_type: monetary_value
      entity_role: measure
      aggregations:
        allowed:
        - avg
        - min
        - max
        default: avg
    - name: actv_flg
      sql_type: INTEGER
      semantic_type: flag
      entity_role: dimension
    - name: crt_dt
      sql_type: DATE
      semantic_type: timestamp_event
      entity_role: metadata
  - name: prod_ref_legacy
    table_type: dimension
    lifecycle: deprecated
    deprecation:
      replacement: prod_ref
      reason: Pre-migration product catalog; superseded by prod_ref which adds surrogate keys, pricing,
        and category linkage.
    grain: one row per product (legacy export)
    source: main.prod_ref_legacy
    columns:
    - name: prod_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: natural_key
      canonical_entity: product
    - name: prod_desc
      sql_type: VARCHAR
      semantic_type: free_text
      entity_role: dimension
    - name: dept_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: foreign_key
      foreign_key:
        references: dept_dim.dept_cd
        relationship: many_to_one
    - name: load_dt
      sql_type: DATE
      semantic_type: timestamp_event
      entity_role: metadata
  - name: prod_attr_ext
    table_type: dimension
    grain: one row per (product, attribute name)
    source: main.prod_attr_ext
    columns:
    - name: prod_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: foreign_key
      foreign_key:
        references: prod_ref.prod_id
        relationship: many_to_one
    - name: attr_nm
      sql_type: VARCHAR
      semantic_type: code
      entity_role: dimension
    - name: attr_val
      sql_type: VARCHAR
      semantic_type: free_text
      entity_role: dimension
  - name: sku_xref
    table_type: dimension
    grain: one row per (product, external system) crosswalk
    source: main.sku_xref
    columns:
    - name: prod_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: foreign_key
      foreign_key:
        references: prod_ref.prod_id
        relationship: many_to_one
    - name: ext_sys_id
      sql_type: VARCHAR
      semantic_type: code
      entity_role: dimension
    - name: ext_sku
      sql_type: VARCHAR
      semantic_type: code
      entity_role: dimension
    - name: sync_dt
      sql_type: DATE
      semantic_type: timestamp_event
      entity_role: metadata
  - name: whs_dim
    table_type: dimension
    grain: one row per warehouse
    source: main.whs_dim
    primary_key:
    - whs_id
    columns:
    - name: whs_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: primary_key
    - name: whs_nm
      sql_type: VARCHAR
      semantic_type: name
      entity_role: dimension
    - name: city_nm
      sql_type: VARCHAR
      semantic_type: geo_city
      entity_role: dimension
    - name: state_cd
      sql_type: VARCHAR
      semantic_type: geo_region
      entity_role: dimension
  - name: store_dim
    table_type: dimension
    grain: one row per store
    source: main.store_dim
    primary_key:
    - store_sk
    columns:
    - name: store_sk
      sql_type: INTEGER
      semantic_type: identifier
      entity_role: primary_key
    - name: store_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: natural_key
      canonical_entity: store
    - name: store_nm
      sql_type: VARCHAR
      semantic_type: name
      entity_role: dimension
    - name: city_nm
      sql_type: VARCHAR
      semantic_type: geo_city
      entity_role: dimension
    - name: state_cd
      sql_type: VARCHAR
      semantic_type: geo_region
      entity_role: dimension
    - name: cntry_cd
      sql_type: VARCHAR
      semantic_type: geo_country
      entity_role: dimension
    - name: whs_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: foreign_key
      foreign_key:
        references: whs_dim.whs_id
        relationship: many_to_one
    - name: open_dt
      sql_type: DATE
      semantic_type: date
      entity_role: dimension
  - name: sls_rep_dim
    table_type: dimension
    grain: one row per sales rep
    source: main.sls_rep_dim
    primary_key:
    - rep_id
    columns:
    - name: rep_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: primary_key
    - name: rep_nm
      sql_type: VARCHAR
      semantic_type: pii_name
      entity_role: dimension
      pii: true
    - name: store_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: foreign_key
      foreign_key:
        references: store_dim.store_id
        relationship: many_to_one
    - name: hire_dt
      sql_type: DATE
      semantic_type: date
      entity_role: dimension
  - name: chnl_dim
    table_type: dimension
    grain: one row per sales channel
    source: main.chnl_dim
    primary_key:
    - chnl_cd
    columns:
    - name: chnl_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: primary_key
    - name: chnl_nm
      sql_type: VARCHAR
      semantic_type: name
      entity_role: dimension
  - name: pmt_mthd_dim
    table_type: dimension
    grain: one row per payment method code
    source: main.pmt_mthd_dim
    primary_key:
    - pmt_mthd_cd
    columns:
    - name: pmt_mthd_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: primary_key
    - name: pmt_mthd_desc
      sql_type: VARCHAR
      semantic_type: name
      entity_role: dimension
  - name: sts_cd_dim
    table_type: dimension
    grain: one row per order status code (decode dictionary)
    source: main.sts_cd_dim
    primary_key:
    - sts_cd
    columns:
    - name: sts_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: primary_key
    - name: sts_desc
      sql_type: VARCHAR
      semantic_type: name
      entity_role: dimension
  - name: evt_typ_dim
    table_type: dimension
    grain: one row per subscription event type code (decode dictionary)
    source: main.evt_typ_dim
    primary_key:
    - evt_typ_cd
    columns:
    - name: evt_typ_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: primary_key
    - name: evt_typ_desc
      sql_type: VARCHAR
      semantic_type: name
      entity_role: dimension
  - name: rtn_rsn_dim
    table_type: dimension
    grain: one row per return reason code (decode dictionary)
    source: main.rtn_rsn_dim
    primary_key:
    - rtn_rsn_cd
    columns:
    - name: rtn_rsn_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: primary_key
    - name: rtn_rsn_desc
      sql_type: VARCHAR
      semantic_type: name
      entity_role: dimension
  - name: curr_dim
    table_type: dimension
    grain: one row per currency
    source: main.curr_dim
    primary_key:
    - curr_cd
    columns:
    - name: curr_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: primary_key
    - name: curr_nm
      sql_type: VARCHAR
      semantic_type: name
      entity_role: dimension
    - name: to_usd_rate
      sql_type: DECIMAL(10,4)
      semantic_type: rate
      entity_role: measure
      aggregations:
        allowed:
        - avg
        - min
        - max
        default: avg
  - name: promo_dim
    table_type: dimension
    grain: one row per promotion
    source: main.promo_dim
    primary_key:
    - promo_id
    columns:
    - name: promo_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: primary_key
    - name: promo_nm
      sql_type: VARCHAR
      semantic_type: name
      entity_role: dimension
    - name: promo_typ_cd
      sql_type: VARCHAR
      semantic_type: enum
      entity_role: dimension
      enum_values:
      - value: PCT_OFF
        meaning: 'guessed: percent-off discount'
        decode_source: llm_guess
      - value: FLAT_OFF
        meaning: 'guessed: flat-amount discount'
        decode_source: llm_guess
      - value: BOGO
        meaning: 'guessed: buy-one-get-one'
        decode_source: llm_guess
    - name: disc_pct
      sql_type: DECIMAL(5,2)
      semantic_type: percentage
      entity_role: measure
      aggregations:
        allowed:
        - avg
        - min
        - max
        default: avg
    - name: start_dt
      sql_type: DATE
      semantic_type: date
      entity_role: dimension
    - name: end_dt
      sql_type: DATE
      semantic_type: date
      entity_role: dimension
  - name: mktg_cmpgn_dim
    table_type: dimension
    grain: one row per marketing campaign
    source: main.mktg_cmpgn_dim
    primary_key:
    - cmpgn_id
    columns:
    - name: cmpgn_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: primary_key
    - name: cmpgn_nm
      sql_type: VARCHAR
      semantic_type: name
      entity_role: dimension
    - name: chnl_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: foreign_key
      foreign_key:
        references: chnl_dim.chnl_cd
        relationship: many_to_one
    - name: start_dt
      sql_type: DATE
      semantic_type: date
      entity_role: dimension
    - name: end_dt
      sql_type: DATE
      semantic_type: date
      entity_role: dimension
    - name: budget_amt
      sql_type: DECIMAL(12,2)
      semantic_type: monetary_value
      entity_role: measure
      aggregations:
        allowed:
        - sum
        - avg
        default: sum
  - name: cust_mstr
    table_type: snapshot_scd2
    grain: one row per customer per validity period (SCD2)
    source: main.cust_mstr
    primary_key:
    - cust_sk
    scd:
      type: 2
      valid_from: eff_start_dt
      valid_to: eff_end_dt
      is_current_flag: is_curr_flg
      natural_key:
      - cust_id
    columns:
    - name: cust_sk
      sql_type: INTEGER
      semantic_type: identifier
      entity_role: primary_key
    - name: cust_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: natural_key
      canonical_entity: customer
    - name: cust_nm
      sql_type: VARCHAR
      semantic_type: pii_name
      entity_role: dimension
      pii: true
    - name: email
      sql_type: VARCHAR
      semantic_type: pii_email
      entity_role: dimension
      pii: true
    - name: city_nm
      sql_type: VARCHAR
      semantic_type: geo_city
      entity_role: dimension
      temporal: scd2
    - name: state_cd
      sql_type: VARCHAR
      semantic_type: geo_region
      entity_role: dimension
      temporal: scd2
    - name: cntry_cd
      sql_type: VARCHAR
      semantic_type: geo_country
      entity_role: dimension
      temporal: scd2
    - name: seg_cd
      sql_type: VARCHAR
      semantic_type: enum
      entity_role: dimension
      temporal: scd2
      enum_values:
      - value: CON
        meaning: 'guessed: consumer segment'
        decode_source: llm_guess
      - value: SMB
        meaning: 'guessed: small/medium business segment'
        decode_source: llm_guess
      - value: ENT
        meaning: 'guessed: enterprise segment'
        decode_source: llm_guess
    - name: src_sys_id
      sql_type: VARCHAR
      semantic_type: code
      entity_role: metadata
      description: Source system code (CRM1/CRM2/LEGACY); no decode dictionary exists in the warehouse.
    - name: eff_start_dt
      sql_type: DATE
      semantic_type: timestamp_effective
      entity_role: dimension
    - name: eff_end_dt
      sql_type: DATE
      semantic_type: timestamp_effective
      entity_role: dimension
    - name: is_curr_flg
      sql_type: INTEGER
      semantic_type: flag
      entity_role: dimension
    - name: crt_dt
      sql_type: DATE
      semantic_type: timestamp_event
      entity_role: metadata
  - name: cust_mstr_legacy
    table_type: dimension
    lifecycle: deprecated
    deprecation:
      replacement: cust_mstr
      reason: Pre-migration flat customer table with no SCD2 versioning; superseded by cust_mstr.
    grain: one row per customer (legacy export, no history)
    source: main.cust_mstr_legacy
    columns:
    - name: cust_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: natural_key
      canonical_entity: customer
    - name: cust_nm
      sql_type: VARCHAR
      semantic_type: pii_name
      entity_role: dimension
      pii: true
    - name: email
      sql_type: VARCHAR
      semantic_type: pii_email
      entity_role: dimension
      pii: true
    - name: city_nm
      sql_type: VARCHAR
      semantic_type: geo_city
      entity_role: dimension
    - name: state_cd
      sql_type: VARCHAR
      semantic_type: geo_region
      entity_role: dimension
    - name: load_dt
      sql_type: DATE
      semantic_type: timestamp_event
      entity_role: metadata
  - name: cust_addr
    table_type: dimension
    grain: one row per (customer, address type)
    source: main.cust_addr
    primary_key:
    - addr_id
    columns:
    - name: addr_id
      sql_type: INTEGER
      semantic_type: identifier
      entity_role: primary_key
    - name: cust_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: foreign_key
      foreign_key:
        references: cust_mstr.cust_id
        relationship: many_to_one
    - name: addr_typ_cd
      sql_type: VARCHAR
      semantic_type: enum
      entity_role: dimension
      enum_values:
      - value: BILL
        meaning: 'guessed: billing address'
        decode_source: llm_guess
      - value: SHIP
        meaning: 'guessed: shipping address'
        decode_source: llm_guess
    - name: line1
      sql_type: VARCHAR
      semantic_type: pii_address
      entity_role: dimension
      pii: true
    - name: city_nm
      sql_type: VARCHAR
      semantic_type: geo_city
      entity_role: dimension
    - name: state_cd
      sql_type: VARCHAR
      semantic_type: geo_region
      entity_role: dimension
    - name: postal_cd
      sql_type: VARCHAR
      semantic_type: geo_postal
      entity_role: dimension
    - name: cntry_cd
      sql_type: VARCHAR
      semantic_type: geo_country
      entity_role: dimension
  - name: ord_hdr
    table_type: fact
    grain: one row per order
    source: main.ord_hdr
    primary_key:
    - ord_id
    columns:
    - name: ord_id
      sql_type: INTEGER
      semantic_type: identifier
      entity_role: primary_key
      aggregations:
        allowed:
        - count
        - count_distinct
        default: count
    - name: cust_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: foreign_key
      description: "References cust_mstr's natural key, not the surrogate cust_sk \u2014 point-in-time\
        \ resolution required (SCD2)."
      foreign_key:
        references: cust_mstr.cust_id
        relationship: many_to_one
    - name: store_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: foreign_key
      foreign_key:
        references: store_dim.store_id
        relationship: many_to_one
    - name: date_key
      sql_type: INTEGER
      semantic_type: identifier
      entity_role: foreign_key
      foreign_key:
        references: date_dim.date_key
        relationship: many_to_one
    - name: ord_dt
      sql_type: DATE
      semantic_type: date
      entity_role: dimension
      description: Redundant copy of date_dim.cal_dt via date_key; kept for convenience (real-warehouse
        cruft).
    - name: sts_cd
      sql_type: VARCHAR
      semantic_type: status_code
      entity_role: dimension
      foreign_key:
        references: sts_cd_dim.sts_cd
        relationship: many_to_one
      enum_values:
      - value: P
        meaning: Pending
        decode_source: dictionary_join
      - value: C
        meaning: Complete
        decode_source: dictionary_join
      - value: X
        meaning: Cancelled
        decode_source: dictionary_join
    - name: chnl_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: foreign_key
      foreign_key:
        references: chnl_dim.chnl_cd
        relationship: many_to_one
    - name: pmt_mthd_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: foreign_key
      foreign_key:
        references: pmt_mthd_dim.pmt_mthd_cd
        relationship: many_to_one
    - name: promo_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: foreign_key
      foreign_key:
        references: promo_dim.promo_id
        relationship: many_to_one
    - name: rep_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: foreign_key
      foreign_key:
        references: sls_rep_dim.rep_id
        relationship: many_to_one
    - name: curr_cd
      sql_type: VARCHAR
      semantic_type: code
      entity_role: foreign_key
      foreign_key:
        references: curr_dim.curr_cd
        relationship: many_to_one
    - name: tot_amt
      sql_type: DECIMAL(12,2)
      semantic_type: monetary_value
      entity_role: measure
      description: Equals SUM(ord_ln.line_amt) for the order; fans out if joined to ord_ln without de-duplication.
      aggregations:
        allowed:
        - sum
        - avg
        - min
        - max
        - count
        default: sum
        fanout_safety:
          strategy: symmetric_aggregate
          symmetric_key: ord_hdr.ord_id
    - name: crt_dt
      sql_type: DATE
      semantic_type: timestamp_event
      entity_role: metadata
      description: ETL load date; may lag ord_dt by up to 2 days.
    - name: src_sys_id
      sql_type: VARCHAR
      semantic_type: code
      entity_role: metadata
      description: Source system code; no decode dictionary exists in the warehouse.
    knowledge:
      required_filters: []
      usage_notes:
      - dly_sls_agg and mth_cust_agg exclude sts_cd = 'X' (cancelled) orders; a raw SUM(tot_amt) over
        ord_hdr without that filter will not match the aggregates.
  - name: ord_ln
    table_type: fact
    grain: one row per order line
    source: main.ord_ln
    primary_key:
    - ord_ln_id
    columns:
    - name: ord_ln_id
      sql_type: INTEGER
      semantic_type: identifier
      entity_role: primary_key
    - name: ord_id
      sql_type: INTEGER
      semantic_type: identifier
      entity_role: foreign_key
      foreign_key:
        references: ord_hdr.ord_id
        relationship: many_to_one
    - name: ln_num
      sql_type: INTEGER
      semantic_type: quantity
      entity_role: metadata
    - name: prod_id
      sql_type: VARCHAR
      semantic_type: identifier
      entity_role: foreign_key
      foreign_key:
        references: prod_ref.prod_id
        relationship: many_to_one
    - name: qty
      sql_type: INTEGER
      semantic_type: quantity
      entity_role: measure
      aggregations:
        allowed:
        - sum
        - avg
        - min
        - max
        default: sum
    - name: unit_price
      sql_type: DECIMAL(10,2)
      semantic_type: monetary_value
      entity_role: measure
      aggregations:
        allowed:
        - avg
        - min
        - max
        default: avg
    - name: line_amt
      sql_type: DECIMAL(12,2)
      semantic_type: monetary_value
      entity_role: measure
      aggregations:
        allowed:
        - sum
        - avg
        - min
        - max
        default: sum
        fanout_safety:
          strategy: symmetric_aggregate
          symmetric_key: ord_ln.ord_ln_id
    - name: line_sts_cd
      sql_type: VARCHAR
      semantic_type: status_code
      entity_role: foreign_key
      description: "Mirrors ord_hdr.sts_cd at line grain; no separate decode table \u2014 join sts_cd_dim\
        \ via ord_hdr if a decode is needed."
